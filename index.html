<style>

.tap{transition:transform .12s ease;cursor:pointer;}.tap:active{transform:scale(.97);}
@keyframes su{from{transform:translateY(12px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes sh{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fd{from{opacity:0}to{opacity:1}}
@keyframes pop{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.stg>*{animation:su .4s cubic-bezier(.2,.7,.2,1) both;}
.stg>*:nth-child(2){animation-delay:.05s}.stg>*:nth-child(3){animation-delay:.1s}.stg>*:nth-child(4){animation-delay:.15s}.stg>*:nth-child(5){animation-delay:.2s}.stg>*:nth-child(6){animation-delay:.25s}
.h1{font-weight:700;font-size:24px;color:var(--ink);}
.sub{font-size:13px;color:var(--muted);margin-top:3px;}

.c{background:#202020;border-radius:18px;box-shadow:0 4px 16px rgba(0,0,0,.4);}

.chip{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:4px 9px;border-radius:20px;}

.btnred{width:100%;background:var(--red);color:#fff;border:none;border-radius:16px;padding:15px;font-size:15px;font-weight:700;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;box-shadow:0 8px 20px rgba(197,21,21,.28);}

.fbtn{border:1px solid var(--line);background:#1c1c1c;color:#CFCFCF;border-radius:20px;padding:7px 13px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;flex-shrink:0;}

.banner{background:#2A1810;color:var(--gold);border:1px solid #4a2c12;border-radius:14px;padding:13px 15px;font-size:12.5px;font-weight:600;margin-top:10px;}
.login{display:flex;flex-direction:column;justify-content:center;min-height:100%;padding:34px 26px;}

@media (display-mode:standalone),(display-mode:fullscreen),(max-width:560px){
body{padding:0;background:#111111;align-items:stretch;justify-content:stretch;}

}

const LIST={
 personel:["İlknur Özdemir","Ertuğrul Aksoy"],
 odemeTuru:["Resmi","EFT","Kredi Kartı","Gayriresmi","Nakit"],

};
let DATA={panel:{},cariOzet:[],musteriler:[],faturalar:[],odemeler:[],cekler:[],kasa:[]};
const S={tab:"panel",sheet:null,cari:null,q:"",qc:"",loading:true,err:"",authed:false,loginErr:""};

function getRemember(){try{return localStorage.getItem("ersa_cari_auth")==="1";}catch(e){return false;}}
S.authed=getRemember();

const $=s=>document.getElementById(s);
const esc=s=>(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

const fmtD=d=>{const x=parseDate(d);if(!x)return"";return String(x.getDate()).padStart(2,"0")+"."+String(x.getMonth()+1).padStart(2,"0")+"."+x.getFullYear();};
const toISO=v=>{const d=parseDate(v);return d?d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"):"";};
const today0=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
const days=d=>Math.round((parseDate(d)-today0())/86400000);
const money=(n,c)=>{c=c||"$";n=n||0;const neg=n<0;return (neg?"-":"")+c+Math.round(Math.abs(n)).toLocaleString("tr-TR");};

 if(!window.API_URL||String(API_URL).indexOf("YAPISTIRIN")>=0){S.loading=false;S.err="config.js içine Apps Script adresinizi yazın.";render();return;}
 S.loading=true;render();
 try{

  if(j.ok===false)throw new Error(j.error||"Hata");

  DATA.faturalar=j.faturalar||[];DATA.odemeler=j.odemeler||[];DATA.cekler=j.cekler||[];DATA.kasa=j.kasa||[];
  S.err="";
 }catch(e){S.err="Bağlantı kurulamadı / adres hatalı.";}
 S.loading=false;render();
}
async function post(payload){

 const j=await r.json(); if(j.ok===false)throw new Error(j.error||"Hata"); return j;

 const p=DATA.panel;
 const kpi=(l,v,c,col)=>`<div class="kpi"><div class="kl">${l}</div><div class="kv" style="color:${col||'#fff'}">${v}</div><div class="kc">${c}</div></div>`;

   </div>

  <div class="blk" style="padding:20px 18px;margin-top:16px;">

    <div style="flex:1;background:#222;border-radius:13px;padding:10px;"><div style="font-size:10px;color:#9b9b95;">Kasa TL</div><div class="bignum" style="font-size:16px;color:#fff;margin-top:2px;">${money(p.kasaTL,'₺')}</div></div>
    <div style="flex:1;background:#222;border-radius:13px;padding:10px;"><div style="font-size:10px;color:#9b9b95;">Kasa USD</div><div class="bignum" style="font-size:16px;color:#fff;margin-top:2px;">${money(p.kasaUSD)}</div></div>

/* ---------- CARİ (müşteri bakiyeleri) ---------- */
function cariCard(c){
 const neg=c.bakiye<0;

function cariView(){
 if(S.cari)return cariDetail();
 let a=DATA.cariOzet.slice().sort((x,y)=>y.bakiye-x.bakiye);
 const q=S.qc.toLowerCase();
 if(q)a=a.filter(c=>(c.musteri||"").toLowerCase().includes(q));

 $("clist").innerHTML=a.length?a.map(cariCard).join(""):`<div class="empty">Kayıt yok.</div>`;

function cariDetail(){
 const m=S.cari;

 const oz=DATA.cariOzet.find(x=>x.musteri===m)||{toplamFatura:0,toplamTahsilat:0,bakiye:0};
 // hareketler: fatura (borç) + ödeme (alacak)

 hareket.sort((a,b)=>(parseDate(a.t)||0)-(parseDate(b.t)||0));
 let bak=0;
 const rows=hareket.map(h=>{bak+=h.borc-h.alacak;const isF=h.borc>0;
  return `<div class="led"><div style="flex:1;min-width:0;"><div style="font-size:12.5px;font-weight:700;color:#fff;">${esc(h.tip)} <span style="color:var(--muted);font-weight:600;">· ${fmtD(h.t)}</span></div><div class="cs" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:170px;">${esc(h.ack||h.no||'')}</div></div>
   <div style="text-align:right;"><div class="bignum" style="font-size:13.5px;color:${isF?'#FF6B5E':'#2ED573'};">${isF?'+':'−'}${money(isF?h.borc:h.alacak)}</div><div style="font-size:10px;color:var(--muted);">bakiye ${money(bak)}</div></div></div>`;}).join("");
 return `<div class="pad stg">
  <div class="tap" data-act="backcari" style="display:inline-flex;align-items:center;gap:3px;color:var(--muted);font-size:13px;font-weight:600;margin-top:4px;">${ic('cl',18)} Cari Hesaplar</div>
  <div class="blk" style="padding:18px;margin-top:8px;">
   <div class="disp" style="font-weight:700;font-size:17px;color:#fff;">${esc(m)}</div>
   <div style="font-size:12px;color:#bdbdb8;margin-top:3px;">${esc(info.sorumlu||'')}${info.telefon?' · '+esc(info.telefon):''}</div>
   ${info.yetkili?`<div style="font-size:12px;color:#bdbdb8;margin-top:1px;">Yetkili: ${esc(info.yetkili)}</div>`:''}
   <div style="display:flex;gap:8px;margin-top:14px;">
    <div style="flex:1;background:#222;border-radius:12px;padding:10px;"><div style="font-size:9.5px;color:#9b9b95;">Fatura</div><div class="bignum" style="font-size:14px;color:#fff;margin-top:2px;">${money(oz.toplamFatura)}</div></div>
    <div style="flex:1;background:#222;border-radius:12px;padding:10px;"><div style="font-size:9.5px;color:#9b9b95;">Tahsilat</div><div class="bignum" style="font-size:14px;color:#2ED573;margin-top:2px;">${money(oz.toplamTahsilat)}</div></div>
    <div style="flex:1;background:#222;border-radius:12px;padding:10px;"><div style="font-size:9.5px;color:#9b9b95;">Bakiye</div><div class="bignum" style="font-size:14px;color:${oz.bakiye<0?'#2ED573':'#fff'};margin-top:2px;">${money(oz.bakiye)}</div></div>
   </div>
  </div>
  <div class="sec">Hesap Hareketleri</div>
  <div class="c" style="padding:2px 15px 8px;">${rows||'<div class="empty">Hareket yok.</div>'}</div>
  <div style="font-size:11px;color:var(--muted2);margin-top:10px;text-align:center;">Çek ve taksit tahsilatları üstteki özet bakiyeye dahildir.</div>
 </div>`;
}

/* ---------- ÇEKLER ---------- */
function cekView(){
 let a=DATA.cekler.slice();
 a.sort((x,y)=>{const xo=x.durum==="Bekliyor"?0:1,yo=y.durum==="Bekliyor"?0:1;if(xo!==yo)return xo-yo;return (parseDate(x.vade)||0)-(parseDate(y.vade)||0);});
 const bekleyen=a.filter(c=>c.durum==="Bekliyor");
 const topUSD=bekleyen.reduce((s,c)=>s+c.usdAlis,0);
 const cards=a.map(c=>{
  const dur=c.durum==="Tahsil Edildi"?{cls:"chip-g",t:"Tahsil edildi"}:{cls:"chip-o",t:"Bekliyor"};
  const n=c.vade?days(c.vade):null;
  const vadeTxt=c.durum==="Bekliyor"&&n!=null?(n<0?"Vade geçti":n+" gün"):"";
  return `<div class="c" style="padding:14px;">
   <div style="display:flex;justify-content:space-between;align-items:center;"><span class="ct" style="flex:1;">${esc(c.musteri)}</span><span class="bignum" style="font-size:16px;color:#fff;">${money(c.usdAlis)}</span></div>
   <div class="cs">${esc(c.cekNo||'')}${c.cekTL?' · '+money(c.cekTL,'₺'):''}</div>
   <div style="display:flex;justify-content:space-between;align-items:center;margin-top:9px;">
    <span class="chip ${dur.cls}">${ic(c.durum==='Tahsil Edildi'?'check':'clock',11)} ${dur.t}</span>
    <span style="font-size:11.5px;color:var(--muted);">Vade: ${fmtD(c.vade)}${vadeTxt?' · '+vadeTxt:''}</span></div>
  </div>`;}).join("");
 return `<div class="pad stg">
  <div class="h1" style="margin-top:6px;">Çek Takibi</div>
  <div class="sub">${bekleyen.length} bekleyen · ${money(topUSD)}</div>
  <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px;">${cards||'<div class="empty">Çek kaydı yok.</div>'}</div>
 </div>`;
}

/* ---------- KASA ---------- */
function kasaView(){
 const p=DATA.panel;
 const a=DATA.kasa.slice().reverse();
 const rows=a.map(k=>{const giris=k.yon==="Giriş";
  return `<div class="led"><div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
    <div class="circ" style="width:30px;height:30px;background:${giris?'var(--greenbg)':'#2A1414'};">${ic(giris?'down':'up',15,giris?'#2ED573':'#FF6B5E')}</div>
    <div style="min-width:0;"><div style="font-size:12.5px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;">${esc(k.aciklama||'')}</div><div class="cs">${fmtD(k.tarih)}${k.kimden?' · '+esc(k.kimden):''}</div></div></div>
   <div style="text-align:right;"><div class="bignum" style="font-size:13.5px;color:${giris?'#2ED573':'#FF6B5E'};">${giris?'+':'−'}${money(k.tutar,k.pb==='$'?'$':'₺')}</div><div style="font-size:10px;color:var(--muted);">${money(k.tlBakiye,'₺')} · ${money(k.usdBakiye)}</div></div></div>`;}).join("");
 return `<div class="pad stg">
  <div class="h1" style="margin-top:6px;">Kasa</div>
  <div class="sub">Nakit giriş / çıkış hareketleri</div>
  <div class="blk" style="padding:16px 18px;margin-top:14px;display:flex;gap:10px;">
   <div style="flex:1;"><div style="font-size:10px;color:#9b9b95;">NAKİT TL</div><div class="bignum" style="font-size:22px;color:#fff;margin-top:3px;">${money(p.kasaTL,'₺')}</div></div>
   <div style="flex:1;border-left:1px solid #333;padding-left:14px;"><div style="font-size:10px;color:#9b9b95;">NAKİT USD</div><div class="bignum" style="font-size:22px;color:#fff;margin-top:3px;">${money(p.kasaUSD)}</div></div>
  </div>
  <div class="sec">Hareketler</div>
  <div class="c" style="padding:2px 15px 8px;">${rows||'<div class="empty">Hareket yok.</div>'}</div>
 </div>`;
}

/* ---------- FORM yardımcıları ---------- */
const finp=(id,l,v,t)=>`<label class="lbl">${l}</label><input id="${id}" class="field" type="${t||'text'}" value="${esc(v||'')}">`;
const ftxt=(id,l,v)=>`<label class="lbl">${l}</label><textarea id="${id}" class="field" style="min-height:58px;resize:vertical;">${esc(v||'')}</textarea>`;
const fsel=(id,l,v,opts)=>`<label class="lbl">${l}</label><select id="${id}" class="field">${opts.map(o=>`<option ${o===v?'selected':''}>${esc(o)}</option>`).join("")}</select>`;
function custInput(id,v){const cust=[...new Set(DATA.musteriler.map(m=>m.sirket))];return `<label class="lbl">Müşteri</label><input id="${id}" class="field" list="custl" value="${esc(v||'')}"><datalist id="custl">${cust.map(c=>`<option value="${esc(c)}">`).join("")}</datalist>`;}
function sheetHead(title){return `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;"><div class="disp" style="font-weight:700;font-size:17px;color:#fff;">${title}</div><div class="circ tap" data-act="close" style="background:#2C2C2C;">${ic('x',16,'#EDEDED')}</div></div>`;}
const todayISO=()=>toISO(new Date());

function sheetFatura(){return `<div class="ovl"><div class="sheet">${sheetHead("Fatura / Borç Ekle")}
  ${custInput('fa_m')}
  ${finp('fa_no','Belge / Fatura No','')}
  <div class="row2"><div>${finp('fa_tar','Fatura Tarihi',todayISO(),'date')}</div><div>${finp('fa_vade','Vade Tarihi',todayISO(),'date')}</div></div>
  ${finp('fa_tutar','Tutar ($)','','number')}
  ${ftxt('fa_ack','Açıklama','')}
  <button class="btnred" data-act="saveFatura">${ic('check',16,'#fff')} Faturayı ekle</button>
 </div></div>`;}
function sheetOdeme(){return `<div class="ovl"><div class="sheet">${sheetHead("Tahsilat / Ödeme Ekle")}
  ${custInput('od_m')}
  <div class="row2"><div>${fsel('od_tur','Ödeme Türü','Resmi',LIST.odemeTuru)}</div><div>${finp('od_tar','Tarih',todayISO(),'date')}</div></div>
  <div class="row2"><div>${finp('od_tl','Tutar (TL)','','number')}</div><div>${finp('od_kur','Kur (TL/$)','','number')}</div></div>
  ${finp('od_usd','USD Karşılığı','','number')}
  <div style="font-size:11px;color:var(--muted);margin:-6px 0 12px;">TL ve Kur girerseniz USD otomatik hesaplanır; ya da doğrudan USD yazın.</div>
  ${ftxt('od_ack','Açıklama','')}
  <button class="btnred" data-act="saveOdeme">${ic('check',16,'#fff')} Tahsilatı ekle</button>
 </div></div>`;}
function sheetCek(){return `<div class="ovl"><div class="sheet">${sheetHead("Çek Ekle")}
  ${custInput('ck_m')}
  ${finp('ck_no','Çek No / Açıklama','')}
  <div class="row2"><div>${finp('ck_tar','Alış Tarihi',todayISO(),'date')}</div><div>${finp('ck_vade','Vade Tarihi',todayISO(),'date')}</div></div>
  <div class="row2"><div>${finp('ck_tl','Çek TL Tutarı','','number')}</div><div>${finp('ck_kur','Alış Kuru (TL/$)','','number')}</div></div>
  <div class="row2"><div>${fsel('ck_durum','Durum','Bekliyor',LIST.cekDurum)}</div><div>${finp('ck_yer','Verildiği Yer','Şirkette')}</div></div>
  <button class="btnred" data-act="saveCek">${ic('check',16,'#fff')} Çeki ekle</button>
 </div></div>`;}
function sheetKasa(){return `<div class="ovl"><div class="sheet">${sheetHead("Kasa Hareketi")}
  ${finp('ka_tar','Tarih',todayISO(),'date')}
  ${finp('ka_ack','Açıklama','')}
  ${finp('ka_kim','Kime / Kimden','')}
  <div class="row2"><div>${fsel('ka_tur','İşlem Türü','Havale',LIST.kasaIslem)}</div><div>${fsel('ka_yon','Yön','Çıkış',LIST.kasaYon)}</div></div>
  <div class="row2"><div>${finp('ka_tutar','Tutar','','number')}</div><div>${fsel('ka_pb','Para Birimi','TL',LIST.pb)}</div></div>
  <button class="btnred" data-act="saveKasa">${ic('check',16,'#fff')} Hareketi ekle</button>
 </div></div>`;}
function sheetMusteri(){return `<div class="ovl"><div class="sheet">${sheetHead("Müşteri Ekle")}
  ${finp('m_sirket','Şirket Adı','')}
  <div class="row2"><div>${fsel('m_sorumlu','Sorumlu','İlknur Özdemir',LIST.personel)}</div><div>${finp('m_tel','Telefon','')}</div></div>
  ${finp('m_eposta','E-posta','','email')}
  ${finp('m_yetkili','Yetkili Kişi','')}
  <div class="row2"><div>${finp('m_vd','Vergi Dairesi','')}</div><div>${finp('m_vno','Vergi No','')}</div></div>
  ${finp('m_acilis','Açılış Bakiyesi ($)','','number')}
  ${ftxt('m_adres','Adres','')}
  <button class="btnred" data-act="saveMusteri">${ic('check',16,'#fff')} Müşteriyi ekle</button>
 </div></div>`;}
function sheetChoose(){
 const opt=(act,ico,t,d)=>`<div class="choose-opt tap" data-act="${act}"><div class="ci">${ic(ico,20,'#fff')}</div><div><div class="ct2">${t}</div><div class="cd">${d}</div></div></div>`;
 return `<div class="ovl"><div class="sheet">${sheetHead("Ne eklemek istersiniz?")}
  ${opt('newFatura','receipt','Fatura / Borç','Müşteriye fatura veya borç kaydı')}
  ${opt('newOdeme','wallet','Tahsilat / Ödeme','Müşteriden alınan ödeme')}
  ${opt('newCek','scroll','Çek','Alınan çek kaydı')}
  ${opt('newKasa','cash','Kasa Hareketi','Nakit giriş / çıkış')}
  ${opt('newMusteri','user','Müşteri','Yeni cari hesap')}
 </div></div>`;}

/* ---------- giriş ---------- */
function renderLogin(){
 $("scr").innerHTML=`<div class="login">
  <img class="logo" src="logo-white.png" alt="ersa machinery">
  <div class="lt">CARİ HESAP & TAHSİLAT</div>
  <label class="lbl">E-posta</label>
  <input id="lemail" class="field" type="email" value="info@ersamachinery.com" autocomplete="username">
  <label class="lbl">Şifre</label>
  <input id="lpass" class="field" type="password" placeholder="••••••••" autocomplete="current-password">
  <label class="rememberbox"><input id="lremember" type="checkbox" ${getRemember()?'checked':''}> Beni hatırla</label>
  <button class="btnred" id="lbtn" data-act="login">${ic('check',16,'#fff')} Giriş Yap</button>
  <div class="lerr">${esc(S.loginErr||"")}</div>
 </div>`;
 $("navhost").innerHTML=""; $("sheethost").innerHTML="";
 const p=$("lpass"); if(p){p.value="";p.addEventListener("keydown",ev=>{if(ev.key==="Enter")$("lbtn").click();});}
}

/* ---------- nav ---------- */
function nav(){
 const slot=(t,i,l)=>`<div class="nslot ${S.tab===t?'on':''}" data-act="tab" data-v="${t}">${ic(i,21,S.tab===t?'#C51515':'#8A8A8A')}<span>${l}</span></div>`;
 return `<div class="navwrap">
  ${slot('panel','home','Panel')}
  ${slot('cari','users','Cari')}
  <div class="cartbtn"><div class="cartcirc tap" data-act="choose">${ic('plus',26,'#fff')}</div></div>
  ${slot('cek','scroll','Çekler')}
  ${slot('kasa','cash','Kasa')}
 </div>`;
}

/* ---------- render ---------- */
function render(){
 if(!S.authed){renderLogin();return;}
 let h;
 if(S.loading){h=`<div class="pad"><div class="empty" style="padding-top:120px;">${ic('refresh',30,'#5A5A5A')}<div style="margin-top:10px;">Yükleniyor…</div></div></div>`;}
 else h=S.tab==='panel'?panelView():S.tab==='cari'?cariView():S.tab==='cek'?cekView():kasaView();
 $("scr").innerHTML=h;
 $("navhost").innerHTML=nav();
 const M={fatura:sheetFatura,odeme:sheetOdeme,cek:sheetCek,kasa:sheetKasa,musteri:sheetMusteri,choose:sheetChoose};
 $("sheethost").innerHTML=S.sheet&&M[S.sheet]?M[S.sheet]():'';
 if(!S.loading&&S.tab==='cari'&&!S.cari){renderCList();const s=$("csearch");if(s)s.oninput=e=>{S.qc=e.target.value;renderCList();};}
 $("scr").scrollTop=0;
}

/* ---------- olaylar ---------- */
$("app").addEventListener("click",async function(e){
 if(e.target.classList&&e.target.classList.contains("ovl")){S.sheet=null;render();return;}
 const el=e.target.closest("[data-act]"); if(!el)return;
 const a=el.getAttribute("data-act");
 if(a==="tab"){S.tab=el.getAttribute("data-v");S.sheet=null;S.cari=null;render();}
 else if(a==="refresh"){load();}
 else if(a==="login"){const em=$("lemail").value.trim().toLowerCase();const pw=$("lpass").value;const rem=$("lremember")&&$("lremember").checked;
   if(em===AUTH.email.toLowerCase()&&pw===AUTH.pass){if(rem){try{localStorage.setItem("ersa_cari_auth","1");}catch(e){}}S.authed=true;S.loginErr="";load();}
   else{S.loginErr="E-posta veya şifre hatalı.";render();}}
 else if(a==="logout"){try{localStorage.removeItem("ersa_cari_auth");}catch(e){}S.authed=false;S.tab="panel";S.sheet=null;S.cari=null;S.loginErr="";render();}
 else if(a==="choose"){S.sheet="choose";render();}
 else if(a==="newFatura"){S.sheet="fatura";render();}
 else if(a==="newOdeme"){S.sheet="odeme";render();}
 else if(a==="newCek"){S.sheet="cek";render();}
 else if(a==="newKasa"){S.sheet="kasa";render();}
 else if(a==="newMusteri"){S.sheet="musteri";render();}
 else if(a==="close"){S.sheet=null;render();}
 else if(a==="cari"){S.cari=el.getAttribute("data-m");render();}
 else if(a==="backcari"){S.cari=null;render();}
 else if(a==="saveFatura"){
   const d={musteri:$("fa_m").value.trim(),no:$("fa_no").value.trim(),faturaTarihi:$("fa_tar").value,vade:$("fa_vade").value,tutar:$("fa_tutar").value,aciklama:$("fa_ack").value.trim()};
   if(!d.musteri){toast("Müşteri zorunlu");return;} if(!d.tutar){toast("Tutar zorunlu");return;}
   await doSave(el,{action:"addFatura",data:d},"Fatura eklendi");}
 else if(a==="saveOdeme"){
   const d={musteri:$("od_m").value.trim(),odemeTuru:$("od_tur").value,tarih:$("od_tar").value,tl:$("od_tl").value,kur:$("od_kur").value,usd:$("od_usd").value,aciklama:$("od_ack").value.trim()};
   if(!d.musteri){toast("Müşteri zorunlu");return;} if(!d.usd&&!(d.tl&&d.kur)){toast("USD veya TL+Kur girin");return;}
   await doSave(el,{action:"addOdeme",data:d},"Tahsilat eklendi");}
 else if(a==="saveCek"){
   const d={musteri:$("ck_m").value.trim(),cekNo:$("ck_no").value.trim(),alisTarihi:$("ck_tar").value,vade:$("ck_vade").value,cekTL:$("ck_tl").value,alisKuru:$("ck_kur").value,durum:$("ck_durum").value,yer:$("ck_yer").value.trim()};
   if(!d.musteri){toast("Müşteri zorunlu");return;} if(!d.cekTL){toast("Çek tutarı zorunlu");return;}
   await doSave(el,{action:"addCek",data:d},"Çek eklendi");}
 else if(a==="saveKasa"){
   const d={tarih:$("ka_tar").value,aciklama:$("ka_ack").value.trim(),kimden:$("ka_kim").value.trim(),islemTuru:$("ka_tur").value,yon:$("ka_yon").value,tutar:$("ka_tutar").value,pb:$("ka_pb").value};
   if(!d.aciklama){toast("Açıklama zorunlu");return;} if(!d.tutar){toast("Tutar zorunlu");return;}
   await doSave(el,{action:"addKasa",data:d},"Kasa hareketi eklendi");}
 else if(a==="saveMusteri"){
   const d={sirket:$("m_sirket").value.trim(),sorumlu:$("m_sorumlu").value,telefon:$("m_tel").value.trim(),eposta:$("m_eposta").value.trim(),yetkili:$("m_yetkili").value.trim(),vd:$("m_vd").value.trim(),vno:$("m_vno").value.trim(),acilis:$("m_acilis").value,adres:$("m_adres").value.trim()};
   if(!d.sirket){toast("Şirket adı zorunlu");return;}
   await doSave(el,{action:"addMusteri",data:d},"Müşteri eklendi");}
});
async function doSave(el,payload,okmsg){
 el.style.opacity=".7";el.textContent="Kaydediliyor…";
 try{await post(payload);S.sheet=null;toast(okmsg);await load();}
 catch(err){toast("Hata: "+err.message);el.style.opacity="1";el.innerHTML=`${ic('check',16,'#fff')} Tekrar dene`;}
}

function clk(){const d=new Date();const el=$("clock");if(el)el.textContent=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");}
clk();setInterval(clk,30000);
if(S.authed){load();}else{S.loading=false;render();}
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){});});}</script>
</body></html>
